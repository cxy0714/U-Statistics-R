# Workflow derived from https://github.com/r-lib/actions/tree/v2/examples
# Need help debugging build failures? Start at https://github.com/r-lib/actions#where-to-find-help
#
# This package wraps a Python backend (via reticulate + py_require()).
# Note: skip_on_cran() does NOT skip on GitHub Actions (NOT_CRAN is "true"
# here), so the Python-dependent tests would otherwise trigger an
# uncontrolled auto-download of Python + torch. Instead we install the
# Python dependencies ourselves (CPU-only torch) and point
# RETICULATE_PYTHON at them, so those tests run for real and stay fast.
on:
  push:
    branches: [main, master]
  pull_request:

name: R-CMD-check

permissions: read-all

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }}

    name: ${{ matrix.config.os }} (${{ matrix.config.r }})

    strategy:
      fail-fast: false
      matrix:
        config:
          - {os: macos-latest,   r: 'release'}
          - {os: windows-latest, r: 'release'}
          - {os: ubuntu-latest,  r: 'devel', http-user-agent: 'release'}
          - {os: ubuntu-latest,  r: 'release'}
          - {os: ubuntu-latest,  r: 'oldrel-1'}

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          http-user-agent: ${{ matrix.config.http-user-agent }}
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck
          needs: check

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python backend (CPU-only torch) and point reticulate at it
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install numpy u-stats
          # On Linux the default PyPI torch bundles CUDA libraries (~2.5 GB);
          # use the CPU wheel index instead. macOS/Windows PyPI wheels are
          # already CPU-only.
          if [ "$RUNNER_OS" = "Linux" ]; then
            pip install torch --index-url https://download.pytorch.org/whl/cpu
          else
            pip install torch
          fi
          echo "RETICULATE_PYTHON=$(python -c 'import sys; print(sys.executable)')" >> "$GITHUB_ENV"

      - uses: r-lib/actions/check-r-package@v2
        with:
          upload-snapshots: true
          build_args: 'c("--no-manual","--compact-vignettes=gs+qpdf")'
